version: '3.8'
services:
  api:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file: .env
    depends_on:
      - redis

  workers:
    build: .
    command: node dist/workers/index.js
    volumes:
      - ./data:/app/data
    env_file: .env
    depends_on:
      - redis

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "3001:3001"
    env_file: .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
